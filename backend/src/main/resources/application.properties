# Server
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant-order-management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Batch-load lazy collections in groups of 30 instead of one query per association (reduces N+1 queries)
spring.jpa.properties.hibernate.default_batch_fetch_size=30

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — JWT_SECRET must be set via environment variable (no default; use application-local.properties for dev)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:28800000}
# Staff/admin token lifetime — covers a full 10AM–10PM restaurant shift with buffer (13h = 46_800_000 ms)
jwt.expiration.staff=${JWT_EXPIRATION_STAFF:46800000}

# CORS — override in production with actual frontend origin
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Table session
table.session.timeout-minutes=60

# Logging
logging.level.com.restaurant=INFO
