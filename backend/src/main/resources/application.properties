# Server
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant-order-management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — override JWT_SECRET env var in production (never commit real secrets)
jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Table session
table.session.timeout-minutes=60

# Logging
logging.level.com.restaurant=INFO
